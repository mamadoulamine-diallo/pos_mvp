<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<body>

<header class="Header" th:fragment="header(activePage)">
  <nav class="Header-nav MainNav">
    <a
            th:href="@{/}"
            class="Header-nav-link"
            th:classappend="${activePage == 'dashboard'} ? ' Header-nav-link--active' : ''"
    >
      <img th:src="@{/assets/styles/icons/Accueil.svg}" class="Header-nav-icon" alt="Accueil">
    </a>

    <a
            th:href="@{/products}"
            class="Header-nav-link"
            th:classappend="${activePage == 'products'} ? ' Header-nav-link--active' : ''"
    >
      <img th:src="@{/assets/styles/icons/productLink.svg}" class="Header-nav-icon" alt="Produits">
    </a>

    <a
            th:href="@{/sales/new}"
            class="Header-nav-link"
            th:classappend="${activePage == 'sales'} ? ' Header-nav-link--active' : ''"
    >
      <img th:src="@{/assets/styles/icons/venteLink.svg}" class="Header-nav-icon" alt="Vente">
    </a>

    <a
            th:href="@{/users}"
            class="Header-nav-link"
            th:classappend="${activePage == 'users'} ? ' active' : ''"
    >
      Utilisateurs
    </a>

    <button
            th:if="${activePage == 'products'}"
            class="Header-nav-link Header-nav-addProduct Products-actions-addProductMobile"
            type="button"
    >
      +
    </button>
  </nav>

  <div class="Header-right NavTools">
    <div class="Header-actions">
      <button class="Header-action CalculatorTrigger" type="button">
        <img th:src="@{/assets/styles/icons/calculator.svg}" class="Header-action-icon" alt="Calculatrice">
      </button>

      <div class="HeaderNotification">
        <button class="Header-action HeaderNotification-trigger" type="button">
          <img
                  th:src="@{/assets/styles/icons/notif.svg}"
                  class="Header-action-icon"
                  alt="Notifications"
          />

          <span
                  class="HeaderNotification-badge"
                  th:if="${globalNotificationCount > 0}"
                  th:text="${globalNotificationCount}"
          >
      0
    </span>
        </button>

        <div class="HeaderNotification-panel">
          <header class="HeaderNotification-header">
            <strong>Notifications</strong>
            <span th:text="${globalNotificationCount} + ' alerte(s)'">0 alerte</span>
          </header>

          <div class="HeaderNotification-list">
            <article
                    class="HeaderNotification-item"
                    th:each="alert : ${globalStockAlerts}"
            >
              <div>
                <strong th:text="${alert.productName}">Produit</strong>
                <small
                        th:text="${alert.stockQuantity == 0}
              ? 'Rupture de stock'
              : 'Stock faible : ' + ${alert.stockQuantity}"
                >
                  Stock faible
                </small>
              </div>

              <span
                      class="HeaderNotification-status"
                      th:classappend="${alert.stockQuantity == 0} ? ' HeaderNotification-status--danger' : ''"
                      th:text="${alert.stockQuantity == 0} ? 'Rupture' : 'Faible'"
              >
          Faible
        </span>
            </article>

            <p
                    class="HeaderNotification-empty"
                    th:if="${globalNotificationCount == 0}"
            >
              Aucune alerte stock.
            </p>
          </div>
        </div>
      </div>
    </div>

    <div class="Header-user">
      <span
              class="Header-user-name"
              th:text="${currentUser != null ? currentUser.role : 'Utilisateur'}"
      >
        GERANT
      </span>

      <span class="Header-user-time">14:30</span>
    </div>

    <a th:href="@{/logout}" class="Header-logout" title="Déconnexion">
      <i class="fa-solid fa-right-from-bracket"></i>
    </a>
  </div>
</header>

</body>
</html>
