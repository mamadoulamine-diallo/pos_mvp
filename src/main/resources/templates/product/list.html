<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Produits</title>
</head>
<body>

<h1>Produits</h1>

<ul>
    <li th:each="product : ${products}">

        <strong th:text="${product.name}">
            Nom produit
        </strong>

        -

        <span th:text="${product.category.name}">
      Catégorie
    </span>

        -

        <span th:text="${product.active}">
      true
    </span>

    </li>
</ul>

</body>
</html>
