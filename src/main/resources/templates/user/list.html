<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Utilisateurs</title>

    <link rel="stylesheet" th:href="@{/assets/styles/style.css}" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>

  <body>
    <div th:replace="~{fragments/header :: header('users')}"></div>

    <main class="Users">
      <section class="Users-actions">
        <h1>Utilisateurs</h1>

        <button class="Users-addButton CTA" type="button">+ Utilisateur</button>
      </section>

      <section class="Users-list">
        <article
          class="UserCard"
          th:each="user : ${users}"
          th:attr="
                    data-id=${user.id},
                    data-name=${user.fullName},
                    data-email=${user.email},
                    data-pin=${user.pinCode},
                    data-role=${user.role},
                    data-active=${user.active}
                "
        >
          <div class="UserCard-content">
            <h2 th:text="${user.fullName}">Nom</h2>

            <span th:text="${user.role}"> GERANT </span>

            <small th:text="${user.email}"> email </small>
          </div>

          <div class="UserCard-actions">
            <span th:text="${user.active ? 'Actif' : 'Inactif'}"> Actif </span>

            <button class="UserCard-edit" type="button">Modifier</button>
          </div>
        </article>
      </section>
    </main>
    <div class="Overlay AddUserOverlay">
      <div class="Overlay-backdrop"></div>

      <div class="Overlay-panel">
        <div class="Overlay-header">
          <h2 class="Overlay-title">+ Nouvel utilisateur</h2>
          <button class="Overlay-close" type="button">×</button>
        </div>

        <form class="AddUserForm">
          <label class="AddProductForm-field">
            <span>Nom complet *</span>
            <input name="fullName" type="text" required />
          </label>

          <label class="AddProductForm-field">
            <span>Email</span>
            <input name="email" type="email" />
          </label>

          <label class="AddProductForm-field">
            <span>PIN *</span>
            <input name="pinCode" type="text" required />
          </label>

          <label class="AddProductForm-field">
            <span>Rôle *</span>
            <select name="role" required>
              <option
                th:each="role : ${roles}"
                th:value="${role}"
                th:text="${role}"
              ></option>
            </select>
          </label>

          <div class="AddProductForm-actions">
            <button type="submit">Créer</button>
          </div>
        </form>
      </div>
    </div>

    <div class="Overlay EditUserOverlay">
      <div class="Overlay-backdrop"></div>

      <div class="Overlay-panel">
        <div class="Overlay-header">
          <h2 class="Overlay-title">Modifier utilisateur</h2>
          <button class="Overlay-close" type="button">×</button>
        </div>

        <form class="EditUserForm">
          <input type="hidden" name="userId" />

          <label class="AddProductForm-field">
            <span>Nom complet *</span>
            <input name="fullName" type="text" required />
          </label>

          <label class="AddProductForm-field">
            <span>Email</span>
            <input name="email" type="email" />
          </label>

          <label class="AddProductForm-field">
            <span>PIN *</span>
            <input name="pinCode" type="text" required />
          </label>

          <label class="AddProductForm-field">
            <span>Rôle *</span>
            <select name="role" required>
              <option
                th:each="role : ${roles}"
                th:value="${role}"
                th:text="${role}"
              ></option>
            </select>
          </label>

          <label class="AddProductForm-field">
            <span>Statut</span>
            <select name="active" required>
              <option value="true">Actif</option>
              <option value="false">Inactif</option>
            </select>
          </label>

          <div class="AddProductForm-actions">
            <button type="submit">Enregistrer</button>
          </div>
        </form>
      </div>
    </div>

    <div th:replace="~{fragments/calculator :: calculator}"></div>

    <script th:src="@{/assets/js/components/calculator.js}"></script>
    <script type="module" th:src="@{/assets/js/components/header.js}"></script>
    <script type="module" th:src="@{/assets/js/user/user.js}"></script>
  </body>
</html>
